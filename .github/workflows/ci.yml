name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend checks ────────────────────────────────────────────────────────

  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    env:
      BACKEND_API_URL: http://127.0.0.1:8000/api/v1
      BACKEND_INTERNAL_API_KEY: spree-internal-ci-key
      NEXTAUTH_SECRET: ci-nextauth-secret
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

  # ── Backend checks ─────────────────────────────────────────────────────────

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./test.db
      BACKEND_INTERNAL_API_KEY: spree-internal-dev-key
      PAYMENTS_MOCK: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest --tb=short -q

  # ── Preview deploy (PR only) ───────────────────────────────────────────────

  preview:
    name: Preview deploy
    if: github.event_name == 'pull_request'
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@54

      - name: Deploy preview
        id: deploy
        run: |
          url=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '**Preview deployment ready** ✅',
                '',
                `🔗 ${process.env.PREVIEW_URL}`,
              ].join('\n')
            })
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}

  # ── Production deploy (main only) ──────────────────────────────────────────

  deploy-frontend:
    name: Deploy frontend → production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend, backend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@54

      - name: Deploy to production
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}

  deploy-backend:
    name: Deploy backend → production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend, backend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@54

      - name: Deploy to production
        # Run from repo root — Vercel reads rootDirectory:"backend" from project
        # settings and uploads only the backend/ subdirectory automatically.
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
