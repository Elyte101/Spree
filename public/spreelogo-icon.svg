<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Spree">
  <!-- Background -->
  <rect width="100" height="100" fill="#F5F4FF"/>
  <!-- Bag handle: inverted-U bail -->
  <path d="M37 29 L37 14 L63 14 L63 29" stroke="#655AFF" stroke-width="6.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bag body: trapezoid wider at top -->
  <path d="M15 29 L85 29 L79 88 L21 88 Z" stroke="#655AFF" stroke-width="6.5" fill="rgba(101,90,255,0.06)" stroke-linejoin="round"/>
  <!-- X-fold interior lines (envelope/package crease pattern) -->
  <line x1="15" y1="29" x2="79" y2="88" stroke="#655AFF" stroke-width="6.5" stroke-linecap="round"/>
  <line x1="85" y1="29" x2="21" y2="88" stroke="#655AFF" stroke-width="6.5" stroke-linecap="round"/>
  <!-- Horizontal mid-crease -->
  <line x1="18" y1="58" x2="82" y2="58" stroke="#655AFF" stroke-width="6.5" stroke-linecap="round"/>
  <!-- 4-pointed sparkle -->
  <path d="M50 35 L52.3 42 L59.5 44 L52.3 46 L50 53 L47.7 46 L40.5 44 L47.7 42 Z" fill="#655AFF"/>
</svg>
